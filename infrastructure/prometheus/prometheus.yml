global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
  
  - job_name: 'bot-fleet'
    static_configs:
      - targets: ['bot-fleet:8002']
  
  - job_name: 'leaderboard-service'
    static_configs:
      - targets: ['leaderboard-service:8003']
  
  - job_name: 'telemetry-ingester'
    static_configs:
      - targets: ['telemetry-ingester:8004']
  
  - job_name: 'chaos-engine'
    static_configs:
      - targets: ['chaos-engine:8005']
  
  - job_name: 'predictor'
    static_configs:
      - targets: ['predictor:8006']
  
  - job_name: 'submission-service'
    static_configs:
      - targets: ['submission-service:8001']
