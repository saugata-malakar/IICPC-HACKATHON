# ─────────────────────────────────────────────────────────────────────────────
# IICPC Platform v2 — Kubernetes Manifests
# Deploy: kubectl apply -f platform.yaml
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Namespace
metadata:
  name: iicpc-platform
  labels:
    name: iicpc-platform

---
# ─── API Gateway Deployment ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: iicpc-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: ghcr.io/iicpc/api-gateway:latest
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: grpc
        env:
        - name: PORT
          value: "8080"
        - name: GRPC_PORT
          value: "9090"
        - name: POSTGRES_DSN
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: dsn
        - name: REDIS_URL
          value: "redis-service:6379"
        - name: KAFKA_BROKERS
          value: "kafka-service:9092"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        resources:
          requests:
            cpu: "1000m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: iicpc-platform
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 80
    targetPort: 8080
  - name: grpc
    port: 9090
    targetPort: 9090

---
# ─── Bot Fleet Deployment with HPA ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-fleet
  namespace: iicpc-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bot-fleet
  template:
    metadata:
      labels:
        app: bot-fleet
    spec:
      containers:
      - name: bot-fleet
        image: ghcr.io/iicpc/bot-fleet:latest
        ports:
        - containerPort: 8002
          name: http
        - containerPort: 9091
          name: grpc
        env:
        - name: PORT
          value: "8002"
        - name: GRPC_PORT
          value: "9091"
        - name: KAFKA_BROKERS
          value: "kafka-service:9092"
        - name: REDIS_URL
          value: "redis-service:6379"
        - name: MAX_BOTS_PER_TARGET
          value: "5000"
        - name: DISRUPTOR_RING_SIZE
          value: "65536"
        resources:
          requests:
            cpu: "4000m"
            memory: "2Gi"
          limits:
            cpu: "8000m"
            memory: "4Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: bot-fleet-service
  namespace: iicpc-platform
spec:
  selector:
    app: bot-fleet
  ports:
  - name: http
    port: 8002
    targetPort: 8002
  - name: grpc
    port: 9091
    targetPort: 9091

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bot-fleet-hpa
  namespace: iicpc-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bot-fleet
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# ─── Telemetry Ingester (Rust) ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-ingester
  namespace: iicpc-platform
spec:
  replicas: 4
  selector:
    matchLabels:
      app: telemetry-ingester
  template:
    metadata:
      labels:
        app: telemetry-ingester
    spec:
      containers:
      - name: telemetry-ingester
        image: ghcr.io/iicpc/telemetry-ingester:latest
        ports:
        - containerPort: 8004
        env:
        - name: PORT
          value: "8004"
        - name: KAFKA_BROKERS
          value: "kafka-service:9092"
        - name: TIMESCALE_DSN
          valueFrom:
            secretKeyRef:
              name: timescale-secret
              key: dsn
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: RUST_LOG
          value: "info"
        - name: EBPF_ENABLED
          value: "false"
        resources:
          requests:
            cpu: "2000m"
            memory: "1Gi"
          limits:
            cpu: "4000m"
            memory: "2Gi"
        securityContext:
          # eBPF requires privileged mode in production
          # privileged: true
          capabilities:
            add: ["NET_ADMIN", "SYS_ADMIN"]

---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-ingester-service
  namespace: iicpc-platform
spec:
  selector:
    app: telemetry-ingester
  ports:
  - port: 8004
    targetPort: 8004

---
# ─── Leaderboard Service ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaderboard-service
  namespace: iicpc-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leaderboard-service
  template:
    metadata:
      labels:
        app: leaderboard-service
    spec:
      containers:
      - name: leaderboard-service
        image: ghcr.io/iicpc/leaderboard-service:latest
        ports:
        - containerPort: 8003
        env:
        - name: PORT
          value: "8003"
        - name: REDIS_URL
          value: "redis-service:6379"
        - name: KAFKA_BROKERS
          value: "kafka-service:9092"
        - name: WS_MAX_CONNECTIONS
          value: "10000"
        resources:
          requests:
            cpu: "1000m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "1Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: leaderboard-service
  namespace: iicpc-platform
spec:
  type: LoadBalancer
  selector:
    app: leaderboard-service
  ports:
  - port: 8003
    targetPort: 8003

---
# ─── Frontend (Next.js) ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: iicpc-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/iicpc/frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://api-gateway-service"
        - name: NEXT_PUBLIC_WS_URL
          value: "ws://leaderboard-service:8003"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: iicpc-platform
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 3000

---
# ─── Redis ────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: iicpc-platform
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7.2-alpine
        ports:
        - containerPort: 6379
        args:
        - redis-server
        - --maxmemory
        - 512mb
        - --maxmemory-policy
        - allkeys-lru
        - --save
        - "60 1000"
        - --appendonly
        - "yes"
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: iicpc-platform
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---
# ─── Network Policy (Sandbox Isolation) ───────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-isolation
  namespace: iicpc-platform
spec:
  podSelector:
    matchLabels:
      role: contestant-sandbox
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: bot-fleet
    ports:
    - protocol: TCP
      port: 8888
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: telemetry-ingester
    ports:
    - protocol: TCP
      port: 8004

---
# ─── Pod Disruption Budget ────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: iicpc-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: api-gateway

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bot-fleet-pdb
  namespace: iicpc-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: bot-fleet
