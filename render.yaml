services:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: iicpc-frontend
    runtime: node
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: iicpc-api-gateway
          type: web
          property: hostport
      - key: NEXT_PUBLIC_WS_URL
        value: ""

  # ─── API Gateway (Go) ──────────────────────────────────────────────────────
  - type: web
    name: iicpc-api-gateway
    runtime: go
    region: oregon
    rootDir: services/api-gateway
    buildCommand: go mod tidy && go build -o app main.go
    startCommand: ./app
    envVars:
      - key: PORT
        value: "8080"
      - key: POSTGRES_DSN
        fromDatabase:
          name: iicpc-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: iicpc-redis
          type: redis
          property: connectionString
      - key: KAFKA_BROKERS
        value: "localhost:9092"
      - key: JWT_SECRET
        value: "iicpc_jwt_supersecret_2026"
      - key: RATE_LIMIT_RPS
        value: "10000"
      - key: GOTOOLCHAIN
        value: "auto"

  # ─── Submission Service (Go) ────────────────────────────────────────────────
  - type: web
    name: iicpc-submission-service
    runtime: go
    region: oregon
    rootDir: services/submission-service
    buildCommand: go mod tidy && go build -o app main.go
    startCommand: ./app
    envVars:
      - key: PORT
        value: "8001"
      - key: POSTGRES_DSN
        fromDatabase:
          name: iicpc-db
          property: connectionString
      - key: KAFKA_BROKERS
        value: "localhost:9092"
      - key: GOTOOLCHAIN
        value: "auto"

  # ─── Bot Fleet (Go) ────────────────────────────────────────────────────────
  - type: web
    name: iicpc-bot-fleet
    runtime: go
    region: oregon
    rootDir: services/bot-fleet
    buildCommand: go mod tidy && go build -o app main.go
    startCommand: ./app
    envVars:
      - key: PORT
        value: "8002"
      - key: KAFKA_BROKERS
        value: "localhost:9092"
      - key: REDIS_URL
        fromService:
          name: iicpc-redis
          type: redis
          property: connectionString
      - key: MAX_BOTS_PER_TARGET
        value: "5000"
      - key: GOTOOLCHAIN
        value: "auto"

  # ─── Leaderboard Service (Go) ──────────────────────────────────────────────
  - type: web
    name: iicpc-leaderboard-service
    runtime: go
    region: oregon
    rootDir: services/leaderboard-service
    buildCommand: go mod tidy && go build -o app main.go
    startCommand: ./app
    envVars:
      - key: PORT
        value: "8003"
      - key: KAFKA_BROKERS
        value: "localhost:9092"
      - key: REDIS_URL
        fromService:
          name: iicpc-redis
          type: redis
          property: connectionString
      - key: GOTOOLCHAIN
        value: "auto"

  # ─── Chaos Engine (Go) ─────────────────────────────────────────────────────
  - type: web
    name: iicpc-chaos-engine
    runtime: go
    region: oregon
    rootDir: services/chaos-engine
    buildCommand: go mod tidy && go build -o app .
    startCommand: ./app
    envVars:
      - key: PORT
        value: "8005"
      - key: KAFKA_BROKERS
        value: "localhost:9092"
      - key: GOTOOLCHAIN
        value: "auto"

  # ─── Predictor (Python) ────────────────────────────────────────────────────
  - type: web
    name: iicpc-predictor
    runtime: python
    region: oregon
    rootDir: services/predictor
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn predictor:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: KAFKA_BROKERS
        value: "localhost:9092"

  # ─── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: iicpc-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  - name: iicpc-db
    region: oregon
    plan: free
    databaseName: iicpc
    user: platform
